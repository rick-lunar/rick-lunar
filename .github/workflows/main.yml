name: Atualizar README e Stats

on:
  schedule:
    # Atualizar a cada 3 Horas para não ficar desatualizado. 
    # horário de Brasília | UTC-3: 21h, 0h, 3h, 6h, 9h, 12h, 15h, 18h
    - cron: '0 */3 * * *' 
  workflow_dispatch:     

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar script de automação
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Commit e Push das alterações
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "💜 Atualização automática: profile stats" || exit 0
          git push
