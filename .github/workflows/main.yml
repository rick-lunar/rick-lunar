name: Atualizar README e Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ADICIONE ESTE BLOCO DE PERMISSÕES:
    permissions:
      contents: write
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      # ... (resto do seu código, setup python, pip install, etc)

      - name: Rodar script de automação
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Commit e Push das alterações
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "🚀 Atualização automática: estatísticas do perfil" || exit 0
          git push
